name: Coin Cast Crypto Scan

on:
  schedule:
    - cron: '7 */4 * * *'
  workflow_dispatch: {}

concurrency:
  group: coin-cast-crypto-scan
  cancel-in-progress: true

permissions:
  contents: read

env:
  KRAKEN_BASE_URL: https://api.kraken.com/0/public
  KRAKEN_UNIVERSE_LIMIT: '0'
  KRAKEN_HISTORY_DAYS: '180'
  KRAKEN_SCAN_CHUNK_SIZE: '200'
  NASDAQ_BASE_URL: https://api.nasdaq.com/api
  STOCK_UNIVERSE_LIMIT: '0'
  STOCK_HISTORY_DAYS: '180'
  GDELT_BASE_URL: https://api.gdeltproject.org/api/v2/doc/doc
  GDELT_TIMESPAN: '24h'
  GDELT_MAX_RECORDS: '50'
  API_RETRY_MAX_ATTEMPTS: '5'
  API_RETRY_INITIAL_DELAY_MS: '1000'
  API_RETRY_MAX_DELAY_MS: '30000'
  COIN_CAST_VERBOSE_LOGS: 'true'

jobs:
  prepare:
    name: Prepare crypto chunks
    runs-on: ubuntu-latest
    outputs:
      chunk_matrix: ${{ steps.prepare.outputs.chunk_matrix }}
      selected_count: ${{ steps.prepare.outputs.selected_count }}
      chunk_count: ${{ steps.prepare.outputs.chunk_count }}
      headline_count: ${{ steps.fetch-headlines.outputs.headline_count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --run

      - name: Prepare crypto chunks
        id: prepare
        run: npx tsx apps/coin-cast/src/ci/prepareCryptoChunks.ts

      - name: Fetch crypto GDELT headlines
        id: fetch-headlines
        env:
          GDELT_HEADLINES_PATH: .artifacts/gdelt/crypto-headlines.json
        run: npx tsx apps/coin-cast/src/ci/fetchGdeltHeadlines.ts crypto

      - name: Upload crypto GDELT headlines artifact
        uses: actions/upload-artifact@v7
        with:
          name: crypto-gdelt-headlines
          path: .artifacts/gdelt/crypto-headlines.json
          if-no-files-found: error
          retention-days: 1

  scan-chunks:
    name: "Scan crypto chunk ${{ matrix.chunk.number }}/${{ needs.prepare.outputs.chunk_count }} (${{ matrix.chunk.size }} pairs: ${{ matrix.chunk.firstSymbol }}-${{ matrix.chunk.lastSymbol }})"
    needs: prepare
    if: ${{ needs.prepare.outputs.chunk_count != '0' }}
    runs-on: ubuntu-latest
    environment: live
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        chunk: ${{ fromJson(needs.prepare.outputs.chunk_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download crypto GDELT headlines artifact
        uses: actions/download-artifact@v8
        with:
          name: crypto-gdelt-headlines
          path: .artifacts/gdelt

      - name: Describe crypto chunk
        run: |
          echo "Scanning crypto chunk ${{ matrix.chunk.number }}/${{ needs.prepare.outputs.chunk_count }}"
          echo "Pairs in chunk: ${{ matrix.chunk.size }}"
          echo "Range: ${{ matrix.chunk.firstSymbol }} -> ${{ matrix.chunk.lastSymbol }}"

      - name: Scan crypto chunk
        env:
          TELEGRAM_BASE_URL: ${{ secrets.TELEGRAM_BASE_URL }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_MESSAGE_DELAY_MS: '0'
          GDELT_HEADLINES_PATH: .artifacts/gdelt/crypto-headlines.json
          KRAKEN_SYMBOLS: ${{ matrix.chunk.symbols }}
        run: npx tsx apps/coin-cast/src/index.ts crypto

  finalize:
    name: Summarize crypto scan
    needs: [prepare, scan-chunks]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Summarize chunked crypto scan
        run: |
          echo "Selected crypto pairs: ${{ needs.prepare.outputs.selected_count }}"
          echo "Chunk jobs: ${{ needs.prepare.outputs.chunk_count }}"
          {
            echo "### Crypto scan summary"
            echo ""
            echo "- Selected crypto pairs: ${{ needs.prepare.outputs.selected_count }}"
            echo "- Chunk jobs: ${{ needs.prepare.outputs.chunk_count }}"
            echo "- Target chunk size: ${{ env.KRAKEN_SCAN_CHUNK_SIZE }}"
            echo "- Cached GDELT headlines: ${{ needs.prepare.outputs.headline_count }}"
          } >> "$GITHUB_STEP_SUMMARY"
